<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Documentation Engine Blog | Jwax Prime Laptops</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-hero-header { text-align: center; padding: 60px 5%; background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); }
        .blog-grid-workspace-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 60px 5%; }
        .blog-article-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; display: flex; flex-direction: column; transition: var(--transition-smooth); }
        .blog-article-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .blog-img-box { height: 200px; overflow: hidden; }
        .blog-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .blog-text-container { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
        .search-blog-input-wrapper { max-width: 500px; margin: 20px auto 0; display: flex; background: var(--bg-main); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 50px; }
        .search-blog-input-wrapper input { flex-grow: 1; padding: 6px; color: var(--text-primary); }
    </style>
</head>
<body>
    <header class="main-header"><nav class="navbar"><a href="index.html" class="logo-brand"><span class="logo-accent">Jwax</span> Insights</a></nav></header>

    <section class="blog-hero-header">
        <h1 style="font-size:2.5rem; font-weight:800;">Hardware Intelligence Engine Logs</h1>
        <p style="color:var(--text-secondary); margin-top:8px;">Deep-dives into diagnostic optimization, laptop engineering parameters, and hardware configuration strategies.</p>
        <div class="search-blog-input-wrapper">
            <input type="text" id="blog-search-field" placeholder="Filter documentation articles via keywords...">
            <button style="cursor:pointer; color:var(--text-light);"><i class="fas fa-search"></i></button>
        </div>
    </section>

    <main class="blog-grid-workspace-layout" id="blog-articles-container-target">
        </main>

    <script src="js/app.js"></script>
    <script>
        const MOCK_BLOG_DATA = [
            { id: 1, title: "Demystifying Laptop Quality Grades: Grade A vs Open Box", excerpt: "Uncover the precise technical criteria sorting professional refurbished enterprise structural hardware units arriving from corporate UK environments.", img: "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?auto=format&fit=crop&w=500&q=80" },
            { id: 2, title: "Maximizing Battery Assembly Endurance Lifecycle on ThinkPads", excerpt: "An engineering structural breakdown map managing charging thresholds parameters optimization workflows via diagnostic firmware registry controllers.", img: "https://images.unsplash.com/photo-1593642632823-8f785ba67e45?auto=format&fit=crop&w=500&q=80" },
            { id: 3, title: "Why Dedicated Workstation GPUs matter for Data Analytics Architectures", excerpt: "Analyzing hardware floating point calculations execution velocities comparing standard layouts vs specialized NVIDIA Quadro configurations.", img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?auto=format&fit=crop&w=500&q=80" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('blog-articles-container-target');
            const searchField = document.getElementById('blog-search-field');

            function renderBlogWorkspace(dataset) {
                if(!container) return;
                container.innerHTML = dataset.map(post => `
                    <article class="blog-article-card">
                        <div class="blog-img-box"><img src="${post.img}" alt="${post.title}"></div>
                        <div class="blog-text-container">
                            <span style="color:var(--accent); font-weight:800; font-size:0.75rem; text-transform:uppercase; margin-bottom:8px; display:block;">Technical Log Dossier</span>
                            <h3 style="font-size:1.25rem; font-weight:800; line-height:1.3; margin-bottom:12px;">${post.title}</h3>
                            <p style="color:var(--text-secondary); font-size:0.95rem; line-height:1.6; margin-bottom:20px;">${post.excerpt}</p>
                            <a href="#" style="font-weight:700; color:var(--text-primary); margin-top:auto; display:inline-flex; align-items:center; gap:6px;" onclick="event.preventDefault(); showToast('Full document expansion requires operational live platform link indexing.');">Access Full Blueprint <i class="fas fa-chevron-right" style="font-size:0.8rem;"></i></a>
                        </div>
                    </article>
                `).join('');
            }

            searchField?.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = MOCK_BLOG_DATA.filter(post => post.title.toLowerCase().includes(query) || post.excerpt.toLowerCase().includes(query));
                renderBlogWorkspace(filtered);
            });

            renderBlogWorkspace(MOCK_BLOG_DATA);
        });
    </script>
</body>
</html>
