<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Settlement Portal | Jwax Prime Laptops</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-container-shell { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        .checkout-step-progress-bar { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .checkout-step-progress-bar::before { content:''; position: absolute; top: 15px; left:0; width: 100%; height: 2px; background-color: var(--border-color); z-index: 1; }
        .step-node { position: relative; z-index: 5; background-color: var(--bg-main); padding: 6px 16px; border: 2px solid var(--border-color); border-radius: 50px; font-weight: 700; color: var(--text-light); }
        .step-node.active { border-color: var(--accent); color: var(--accent); background-color: var(--bg-surface); }
        .form-pane { background-color: var(--bg-surface); border: 1px solid var(--border-color); padding: 40px; border-radius: var(--radius-md); display: none; }
        .form-pane.active { display: block; }
        .form-grid-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-wrapper-block { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .input-wrapper-block label { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: var(--text-secondary); }
        .input-wrapper-block input, .input-wrapper-block select { padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background-color: var(--bg-main); color: var(--text-primary); }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <main class="checkout-container-shell">
        <div class="checkout-step-progress-bar">
            <span class="step-node active" id="node-1">1. Logistics Destination</span>
            <span class="step-node" id="node-2">2. Settlement Structure</span>
        </div>

        <form id="checkout-multi-step-form">
            <div class="form-pane active" id="pane-1">
                <h2 style="margin-bottom:24px; font-weight:800;">Corporate Delivery Shipping Allocation</h2>
                <div class="form-grid-split">
                    <div class="input-wrapper-block"><label>Full Legal Recipient Name</label><input type="text" id="bill-name" required></div>
                    <div class="input-wrapper-block"><label>Business Contact Number</label><input type="tel" id="bill-phone" required></div>
                </div>
                <div class="input-wrapper-block"><label>Destination Street Address</label><input type="text" id="bill-address" required></div>
                <div class="form-grid-split">
                    <div class="input-wrapper-block">
                        <label>State Region Location</label>
                        <select id="bill-state" required>
                            <option value="Lagos">Lagos State Destination Hub</option>
                            <option value="Abuja">Abuja Federal Capital territory</option>
                            <option value="Rivers">Port Harcourt / Rivers State</option>
                        </select>
                    </div>
                    <div class="input-wrapper-block"><label>Postal Zip Code</label><input type="text" id="bill-zip"></div>
                </div>
                <button type="button" class="btn btn-primary" onclick="transitionStep(2)" style="margin-top:20px; float:right;">Advance to Financial Settlement Framework</button>
            </div>

            <div class="form-pane" id="pane-2">
                <h2 style="margin-bottom:24px; font-weight:800;">Secure Escrow Payment Gateway Configurations</h2>
                <div class="input-wrapper-block">
                    <label>Preferred Settlement Pipeline</label>
                    <select id="payment-method-select">
                        <option value="transfer">Instant Bank Electronic Ledger Transfer</option>
                        <option value="card">Verified Paystack Secure Card Matrix Authentication</option>
                    </select>
                </div>
                <div style="background-color:var(--bg-main); padding:20px; border-radius:var(--radius-sm); margin-bottom:24px; border:1px solid var(--border-color);">
                    <p style="font-weight:600;"><i class="fas fa-university" style="color:var(--accent); margin-right:10px;"></i> Processing Account Details: <strong>Sterling Bank • Jwax Prime Logistical Networks • 1023456789</strong></p>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:30px;">
                    <button type="button" class="btn btn-secondary" onclick="transitionStep(1)" style="color:var(--text-primary); border-color:var(--border-color);">Revert back to Shipping Logistics</button>
                    <button type="submit" class="btn btn-primary" style="background:var(--success); box-shadow:none;">Authorize & Finalize Commercial Settlement</button>
                </div>
            </div>
        </form>
    </main>

    <script src="js/app.js"></script>
    <script>
        window.transitionStep = function(targetStep) {
            if(targetStep === 2) {
                if(!document.getElementById('bill-name').value || !document.getElementById('bill-phone').value || !document.getElementById('bill-address').value) {
                    showToast("Please fully clear validation requirements across all necessary logistics entry inputs.", "danger");
                    return;
                }
                document.getElementById('pane-1').classList.remove('active');
                document.getElementById('pane-2').classList.add('active');
                document.getElementById('node-2').classList.add('active');
            } else {
                document.getElementById('pane-2').classList.remove('active');
                document.getElementById('pane-1').classList.add('active');
                document.getElementById('node-2').classList.remove('active');
            }
        };

        document.getElementById('checkout-multi-step-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast("Commercial validation clearing complete. Order entry dispatched to operations hub standard logs.", "success");
            AppState.cart = [];
            AppState.syncCart();
            setTimeout(() => window.location.href = 'index.html', 2500);
        });
    </script>
</body>
</html>
