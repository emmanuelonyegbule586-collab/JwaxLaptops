<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing Exception 404 | Jwax Prime Laptops</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap">

    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-viewport-canvas { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; background-color: var(--bg-main); }
        .error-code-branding { font-size: 8rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 10px; }

<body>
    <main class="error-viewport-canvas">
        <div class="error-code-branding">404</div>
        <h1 style="font-size:2rem; font-weight:800; margin-bottom:12px; color:var(--text-primary);">System Routing Execution Exception</h1>
        <p style="color:var(--text-secondary); max-width:500px; line-height:1.6; margin-bottom:30px;">The resource string configuration path target parameters index location you attempted to access does not exist on this hardware directory layout branch cluster map.</p>
        <a href="index.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Re-anchor to Main Command Gateway</a>

    <script src="js/app.js"></script>
