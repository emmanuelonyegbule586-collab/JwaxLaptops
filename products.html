<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stock Catalog | Jwax Prime Laptops</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .catalog-workspace-interface { display: flex; gap: 40px; padding: 50px 5%; }
        .filter-sidebar-panel { width: 300px; background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 30px; height: fit-content; position: sticky; top: 100px; }
        .catalog-main-display-window { flex-grow: 1; }
        .filter-group { margin-bottom: 24px; }
        .filter-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; color: var(--text-secondary); }
        .filter-group select, .filter-group input[type="range"] { width: 100%; padding: 12px; background-color: var(--bg-main); border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-primary); }
        .catalog-controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background-color: var(--bg-surface); padding: 16px 24px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); }
        .catalog-sort-select { padding: 8px 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background-color: var(--bg-main); color: var(--text-primary); font-weight: 600; }
        .pagination-container { display: flex; justify-content: center; gap: 10px; margin-top: 50px; }
        .page-btn { padding: 10px 18px; border: 1px solid var(--border-color); background-color: var(--bg-surface); color: var(--text-primary); font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition-smooth); }
        .page-btn.active, .page-btn:hover { background: var(--primary-gradient); color: #fff; border-color: transparent; }
        /* Modal Quick View Interface styling */
        .quick-view-modal-backdrop { position: fixed; top:0; left:0; width:100vw; height:100vh; background-color: rgba(15,23,42,0.6); backdrop-filter: blur(5px); z-index: 2000; display:flex; justify-content:center; align-items:center; }
        .quick-view-modal-content { background-color: var(--bg-surface); width: 90%; max-width: 850px; padding: 40px; border-radius: var(--radius-lg); position: relative; animation: modalPop 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalPop { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
        .modal-close-btn { position: absolute; top:20px; right:20px; font-size:2rem; cursor:pointer; color:var(--text-light); }
        .modal-close-btn:hover { color: var(--danger); }
        .modal-body-split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .modal-img-container img { border-radius: var(--radius-md); width:100%; max-height:350px; object-fit: cover; }
        .quick-view-overlay-btn { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(15,23,42,0.85); color: #fff; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 700; opacity: 0; transition: var(--transition-smooth); pointer-events: none; }
        .product-image-frame:hover .quick-view-overlay-btn { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        @media (max-width: 900px) { .catalog-workspace-interface { flex-direction: column; } .filter-sidebar-panel { width: 100%; position: static; } .modal-body-split { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <header class="main-header">
        <nav class="navbar">
            <a href="index.html" class="logo-brand"><span class="logo-accent">Jwax</span> Prime</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="wishlist.html" class="nav-icon-link"><i class="fas fa-heart"></i><span class="badge" id="wishlist-badge">0</span></a>
                <a href="cart.html" class="nav-icon-link"><i class="fas fa-shopping-bag"></i><span class="badge badge-accent" id="cart-badge">0</span></a>
            </div>
        </nav>
    </header>

    <main class="catalog-workspace-interface">
        <aside class="filter-sidebar-panel">
            <div class="filter-group">
                <label>System Brand</label>
                <select id="filter-brand-select">
                    <option value="all">All Available Brands</option>
                    <option value="Lenovo">Lenovo Enterprise</option>
                    <option value="HP">HP Corporate elite</option>
                    <option value="Dell">Dell Performance</option>
                    <option value="Apple">Apple Creative</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Operational Tier Category</label>
                <select id="filter-category-select">
                    <option value="all">All Tiers</option>
                    <option value="Enterprise">Enterprise Business</option>
                    <option value="Gaming">Pro Gaming</option>
                    <option value="Creative">Creative Workspace</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Memory Profile (RAM)</label>
                <select id="filter-ram-select">
                    <option value="all">Any Capacity</option>
                    <option value="16GB">16GB RAM Minimum</option>
                    <option value="32GB">32GB RAM Extreme</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Max Budget Cap</label>
                <input type="range" id="filter-price-range" min="400000" max="2000000" step="50000" value="2000000">
                <span id="price-range-readout" style="font-weight:700; color:var(--accent); display:block; margin-top:8px;">₦2,000,000</span>
            </div>
        </aside>

        <section class="catalog-main-display-window">
            <div class="catalog-controls-row">
                <p>Curated Premium Units Vetted Standard Configuration</p>
                <select id="catalog-sort-select" class="catalog-sort-select">
                    <option value="default">Standard Inventory Sequencing</option>
                    <option value="price-low">Price Structure: Low to High</option>
                    <option value="price-high">Price Structure: High to Low</option>
                </select>
            </div>
            <div class="products-grid-layout" id="catalog-rendering-target"></div>
            <div class="pagination-container" id="pagination-container"></div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/products.js"></script>
</body>
</html>
