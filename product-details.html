<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Product Blueprint | Jwax Prime Laptops</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-grid-workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 60px 5%; }
        .gallery-viewer-frame { position: relative; overflow: hidden; border-radius: var(--radius-md); background-color: #fff; border: 1px solid var(--border-color); height: 450px; }
        .gallery-viewer-frame img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.1s ease-out; transform-origin: center center; }
        .tech-spec-table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        .tech-spec-table th, .tech-spec-table td { padding: 14px 18px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .tech-spec-table th { background-color: var(--bg-main); font-weight: 700; width: 30%; }
        .quantity-controller-row { display: flex; align-items: center; gap: 20px; margin: 30px 0; }
        .quantity-stepper-box { display: flex; align-items: center; border: 1px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; background:#fff; }
        .quantity-stepper-box button { padding: 10px 16px; background: none; cursor: pointer; font-weight: 700; }
        .quantity-stepper-box span { padding: 0 20px; font-weight: 700; }
        @media (max-width: 850px) { .details-grid-workspace { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <header class="main-header"><nav class="navbar"><a href="index.html" class="logo-brand"><span class="logo-accent">Jwax</span> Prime</a></nav></header>

    <main id="details-master-injector-node">
        </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const activeId = localStorage.getItem('jwax_selected_product') || 'LP001';
            const product = JWAX_DATABASE.find(p => p.id === activeId);
            const target = document.getElementById('details-master-injector-node');
            
            if(!product || !target) return;

            let structuralQty = 1;

            target.innerHTML = `
                <section class="details-grid-workspace">
                    <div class="gallery-viewer-frame" id="zoom-lens-frame">
                        <img id="zoom-target-image" src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="technical-specs-breakdown-panel">
                        <span style="color:var(--accent); font-weight:800; text-transform:uppercase; letter-spacing:1px;">${product.brand} Vetted Framework</span>
                        <h1 style="font-size:2.5rem; font-weight:800; margin:10px 0 20px;">${product.name}</h1>
                        <p style="color:var(--text-secondary); font-size:1.1rem; line-height:1.7;">Enterprise diagnostic monitoring protocols verified this hardware unit to be in exceptional, top-tier operational capability status. Delivered safely directly to your workspace.</p>
                        
                        <table class="tech-spec-table">
                            <tr><th>Processor Hardware</th><td>${product.processor}</td></tr>
                            <tr><th>RAM Layout</th><td>${product.ram} System Memory</td></tr>
                            <tr><th>Solid State Drive</th><td>${product.storage} NVMe Storage</td></tr>
                            <tr><th>Hardware Quality</th><td>Diagnostic ${product.grade} Standard</td></tr>
                        </table>

                        <div class="quantity-controller-row">
                            <div class="quantity-stepper-box">
                                <button id="dec-qty">&minus;</button>
                                <span id="qty-readout">1</span>
                                <button id="inc-qty">&plus;</button>
                            </div>
                            <h2 style="font-size:2rem; font-weight:800;">₦${product.price.toLocaleString()}</h2>
                        </div>

                        <button class="btn btn-primary btn-lg" id="add-to-cart-action-details" style="width:100%; justify-content:center;"><i class="fas fa-shopping-basket"></i> Commit Asset Allocation to Cart</button>
                    </div>
                </section>
            `;

            // Operational Zoom Lens Architecture implementation
            const lensFrame = document.getElementById('zoom-lens-frame');
            const targetImg = document.getElementById('zoom-target-image');
            
            lensFrame.addEventListener('mousemove', (e) => {
                const { left, top, width, height } = lensFrame.getBoundingClientRect();
                const x = ((e.clientX - left) / width) * 100;
                const y = ((e.clientY - top) / height) * 100;
                targetImg.style.transformOrigin = `${x}% ${y}%`;
                targetImg.style.transform = 'scale(1.8)';
            });

            lensFrame.addEventListener('mouseleave', () => {
                targetImg.style.transform = 'scale(1)';
                targetImg.style.transformOrigin = 'center center';
            });

            // Local Interactive Handlers configuration
            const qtyReadout = document.getElementById('qty-readout');
            document.getElementById('inc-qty').addEventListener('click', () => { structuralQty++; qtyReadout.textContent = structuralQty; });
            document.getElementById('dec-qty').addEventListener('click', () => { if(structuralQty > 1) { structuralQty--; qtyReadout.textContent = structuralQty; } });

            document.getElementById('add-to-cart-action-details').addEventListener('click', () => {
                const existing = AppState.cart.find(item => item.id === product.id);
                if (existing) { existing.qty += structuralQty; } else { AppState.cart.push({ ...product, qty: structuralQty }); }
                AppState.syncCart();
                showToast(`Injected ${structuralQty} units of asset ${product.id} directly into processing pipeline.`);
            });
        });
    </script>
</body>
</html>
